<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MaiThaiNibbles | Audio Screensaver</title>
  <style>
    :root {
      --bg0: #03040a;
      --bg1: #07111f;
      --panel: rgba(10, 14, 24, 0.62);
      --line: rgba(255, 255, 255, 0.12);
      --text: #eef3ff;
      --muted: rgba(238, 243, 255, 0.72);
      --glow: rgba(120, 190, 255, 0.28);
      --danger: #ff6b9a;
      --ok: #8affc1;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 20%, rgba(48, 88, 160, 0.28), transparent 35%), radial-gradient(circle at 80% 10%, rgba(0, 229, 255, 0.12), transparent 25%), linear-gradient(180deg, var(--bg1), var(--bg0));
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      touch-action: none;
    }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
    .hud { position: fixed; top: 16px; left: 16px; right: 16px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; pointer-events: none; z-index: 5; }
    .panel { pointer-events: auto; backdrop-filter: blur(16px); background: var(--panel); border: 1px solid var(--line); border-radius: 18px; box-shadow: 0 16px 48px rgba(0,0,0,0.35), 0 0 24px var(--glow); }
    .title-box { padding: 14px 16px; min-width: 220px; }
    .eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .title { font-size: clamp(18px, 2.2vw, 28px); font-weight: 700; margin: 0 0 6px; }
    .subtitle { margin: 0; color: var(--muted); line-height: 1.4; font-size: 13px; max-width: 380px; }
    .controls { width: min(360px, calc(100vw - 32px)); padding: 14px; display: grid; gap: 10px; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    button { appearance: none; border: 1px solid var(--line); background: rgba(255,255,255,0.06); color: var(--text); border-radius: 12px; padding: 12px 14px; font-weight: 700; cursor: pointer; min-height: 44px; }
    button:hover { background: rgba(255,255,255,0.12); }
    button:active { transform: translateY(1px); }
    .primary { box-shadow: 0 0 24px rgba(82, 172, 255, 0.18); }
    .pill { padding: 8px 10px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); font-size: 12px; }
    .label { font-size: 12px; color: var(--muted); min-width: 74px; }
    input[type="range"] { flex: 1; min-width: 140px; }
    .footer { position: fixed; left: 16px; right: 16px; bottom: 16px; display: flex; justify-content: space-between; align-items: center; gap: 10px; z-index: 5; pointer-events: none; }
    .footer .panel { pointer-events: auto; padding: 10px 12px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 12px rgba(255, 107, 154, 0.8); flex: 0 0 auto; }
    .dot.live { background: var(--ok); box-shadow: 0 0 12px rgba(138, 255, 193, 0.8); }
    @media (max-width: 900px) {
      .hud { flex-direction: column; align-items: stretch; }
      .controls { width: 100%; }
      .footer { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="hud">
    <div class="panel title-box">
      <div class="eyebrow">MaiThaiNibbles</div>
      <h1 class="title">Futuristic Audio Screensaver</h1>
      <p class="subtitle">Tap start, allow microphone access, and the screen will bloom, pulse, and warp to live sound using the Web Audio API.</p>
    </div>
    <div class="panel controls">
      <div class="row">
        <button id="startBtn" class="primary">Start Mic</button>
        <button id="toggleUiBtn">Hide UI</button>
        <div id="statusPill" class="pill">Idle</div>
      </div>
      <div class="row"><span class="label">Sensitivity</span><input id="sensitivity" type="range" min="0.4" max="3.2" step="0.05" value="1.4" /></div>
      <div class="row"><span class="label">Motion</span><input id="motion" type="range" min="0.2" max="2.5" step="0.05" value="1.0" /></div>
      <div class="row"><span class="label">Bloom</span><input id="bloom" type="range" min="0.2" max="2.4" step="0.05" value="1.1" /></div>
    </div>
  </div>
  <div class="footer" id="footer">
    <div class="panel"><span id="liveDot" class="dot"></span><span id="liveText">Microphone inactive</span></div>
    <div class="panel">Touch anywhere to launch energy waves.</div>
  </div>
  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const toggleUiBtn = document.getElementById('toggleUiBtn');
    const statusPill = document.getElementById('statusPill');
    const sensitivityInput = document.getElementById('sensitivity');
    const motionInput = document.getElementById('motion');
    const bloomInput = document.getElementById('bloom');
    const footer = document.getElementById('footer');
    const liveDot = document.getElementById('liveDot');
    const liveText = document.getElementById('liveText');
    const hud = document.querySelector('.hud');
    let w = 0, h = 0, dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1)), time = 0;
    let audioCtx = null, analyser = null, micSource = null, micStream = null, freqData = null, uiHidden = false;
    const pointerWaves = [], stars = [], rings = [];
    const audioState = { amp: 0, bass: 0, mids: 0, highs: 0, flux: 0, ready: false };
    function resize() {
      w = window.innerWidth; h = window.innerHeight; dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      canvas.width = Math.floor(w * dpr); canvas.height = Math.floor(h * dpr); canvas.style.width = w + 'px'; canvas.style.height = h + 'px'; ctx.setTransform(dpr, 0, 0, dpr, 0, 0); buildField();
    }
    function buildField() {
      stars.length = 0; const count = Math.floor((w * h) / 9000);
      for (let i = 0; i < count; i++) stars.push({ x: Math.random() * w, y: Math.random() * h, z: 0.3 + Math.random() * 1.8, r: 0.4 + Math.random() * 1.8, drift: 0.2 + Math.random() * 0.8, seed: Math.random() * Math.PI * 2 });
      rings.length = 0; const ringCount = Math.max(8, Math.floor(Math.min(w, h) / 70));
      for (let i = 0; i < ringCount; i++) rings.push({ radius: 60 + i * 28, phase: Math.random() * Math.PI * 2, speed: 0.1 + Math.random() * 0.35, width: 0.5 + Math.random() * 1.8 });
    }
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    function avgRange(startRatio, endRatio) {
      if (!freqData) return 0; const start = Math.floor(freqData.length * startRatio); const end = Math.max(start + 1, Math.floor(freqData.length * endRatio)); let sum = 0;
      for (let i = start; i < end; i++) sum += freqData[i]; return sum / ((end - start) * 255);
    }
    async function startMic() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        if (!micStream) {
          micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, video: false });
          analyser = audioCtx.createAnalyser(); analyser.fftSize = 2048; analyser.smoothingTimeConstant = 0.82; freqData = new Uint8Array(analyser.frequencyBinCount); micSource = audioCtx.createMediaStreamSource(micStream); micSource.connect(analyser);
        }
        audioState.ready = true; statusPill.textContent = 'Listening'; liveText.textContent = 'Microphone live'; liveDot.classList.add('live'); startBtn.textContent = 'Mic Live';
      } catch (err) {
        console.error(err); statusPill.textContent = 'Mic blocked'; liveText.textContent = 'Microphone permission denied'; liveDot.classList.remove('live'); startBtn.textContent = 'Retry Mic';
      }
    }
    function updateAudio() {
      if (!analyser || !freqData) { audioState.amp *= 0.95; audioState.bass *= 0.95; audioState.mids *= 0.95; audioState.highs *= 0.95; audioState.flux *= 0.92; return; }
      const prevAmp = audioState.amp; analyser.getByteFrequencyData(freqData); const sensitivity = parseFloat(sensitivityInput.value);
      const bass = clamp(avgRange(0.00, 0.06) * 2.2 * sensitivity, 0, 1.7); const mids = clamp(avgRange(0.06, 0.28) * 1.8 * sensitivity, 0, 1.5); const highs = clamp(avgRange(0.28, 0.95) * 1.6 * sensitivity, 0, 1.4); const amp = clamp((bass * 0.46 + mids * 0.34 + highs * 0.20), 0, 1.6);
      audioState.bass = audioState.bass * 0.76 + bass * 0.24; audioState.mids = audioState.mids * 0.78 + mids * 0.22; audioState.highs = audioState.highs * 0.75 + highs * 0.25; audioState.amp = audioState.amp * 0.72 + amp * 0.28; audioState.flux = Math.max(0, (audioState.amp - prevAmp) * 4.5);
      if (audioState.flux > 0.18) pointerWaves.push({ x: w * (0.35 + Math.random() * 0.3), y: h * (0.3 + Math.random() * 0.4), r: 10, life: 1, speed: 120 + Math.random() * 120, strength: 0.3 + audioState.flux });
    }
    function drawBackdrop() {
      ctx.clearRect(0, 0, w, h); const bloom = parseFloat(bloomInput.value); const ampGlow = audioState.amp * bloom;
      const g1 = ctx.createRadialGradient(w * 0.5, h * 0.52, 40, w * 0.5, h * 0.52, Math.max(w, h) * (0.45 + ampGlow * 0.2)); g1.addColorStop(0, `rgba(100, 180, 255, ${0.10 + ampGlow * 0.12})`); g1.addColorStop(0.4, `rgba(70, 120, 255, ${0.08 + audioState.mids * 0.09})`); g1.addColorStop(1, 'rgba(0,0,0,0)'); ctx.fillStyle = g1; ctx.fillRect(0, 0, w, h);
      const g2 = ctx.createRadialGradient(w * 0.2, h * 0.18, 0, w * 0.2, h * 0.18, Math.max(w, h) * 0.35); g2.addColorStop(0, `rgba(0,255,220,${0.04 + audioState.highs * 0.08})`); g2.addColorStop(1, 'rgba(0,0,0,0)'); ctx.fillStyle = g2; ctx.fillRect(0, 0, w, h);
    }
    function drawStars() {
      const motion = parseFloat(motionInput.value);
      for (const s of stars) {
        const sway = Math.sin(time * (0.2 + s.drift * 0.12) + s.seed) * 16 * motion; const pulse = 0.5 + audioState.highs * 1.4 + Math.sin(time * 0.8 + s.seed) * 0.2; const y = (s.y + time * 10 * s.drift * motion) % (h + 60) - 30; const x = s.x + sway + Math.sin(time * 0.35 + s.seed * 1.7) * audioState.mids * 18;
        ctx.beginPath(); ctx.fillStyle = `rgba(180,220,255,${0.25 + pulse * 0.25})`; ctx.arc(x, y, s.r * (0.7 + pulse * 0.6), 0, Math.PI * 2); ctx.fill();
      }
    }
    function drawTunnel() {
      const cx = w / 2, cy = h / 2, motion = parseFloat(motionInput.value); ctx.save(); ctx.translate(cx, cy); ctx.globalCompositeOperation = 'screen';
      for (let i = 0; i < rings.length; i++) {
        const ring = rings[i]; const phase = ring.phase + time * ring.speed * motion; const bassWarp = 1 + audioState.bass * 0.22 * Math.sin(phase * 1.7 + i * 0.3); const midsWarp = 1 + audioState.mids * 0.18 * Math.cos(phase * 1.3 - i * 0.2); const rx = ring.radius * bassWarp * (1 + i * 0.004); const ry = ring.radius * midsWarp * (0.72 + Math.sin(phase) * 0.02); const rot = phase * 0.4 + i * 0.03;
        ctx.save(); ctx.rotate(rot); ctx.beginPath(); ctx.strokeStyle = `rgba(${Math.floor(120 + audioState.highs * 70)}, ${Math.floor(170 + audioState.mids * 40)}, 255, ${0.06 + i / rings.length * 0.18})`; ctx.lineWidth = ring.width + audioState.amp * 1.7; ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
      }
      const spokes = 18;
      for (let i = 0; i < spokes; i++) {
        const a = (i / spokes) * Math.PI * 2 + time * 0.1; const len = Math.min(w, h) * (0.18 + audioState.amp * 0.22 + (i % 2) * 0.02); ctx.beginPath(); ctx.strokeStyle = `rgba(90, 200, 255, ${0.04 + audioState.highs * 0.08})`; ctx.lineWidth = 1 + audioState.highs * 1.4; ctx.moveTo(Math.cos(a) * 28, Math.sin(a) * 28); ctx.lineTo(Math.cos(a) * len, Math.sin(a) * len); ctx.stroke();
      }
      ctx.restore(); ctx.globalCompositeOperation = 'source-over';
    }
    function drawGrid() {
      const step = Math.max(32, Math.min(72, Math.min(w, h) / 12)); const motion = parseFloat(motionInput.value); ctx.save(); ctx.lineWidth = 1;
      for (let y = -step; y < h + step; y += step) {
        ctx.beginPath();
        for (let x = -step; x < w + step; x += step) {
          const nx = x / w - 0.5, ny = y / h - 0.5, dist = Math.hypot(nx, ny); const wave = Math.sin(dist * 20 - time * (1.2 + audioState.bass * 2.2) * motion) * (12 + audioState.amp * 24); const py = y + wave * (1 - Math.min(1, dist * 1.4));
          if (x === -step) ctx.moveTo(x, py); else ctx.lineTo(x, py);
        }
        ctx.strokeStyle = `rgba(120, 170, 255, ${0.035 + audioState.mids * 0.06})`; ctx.stroke();
      }
      ctx.restore();
    }
    function updateAndDrawWaves(dt) {
      for (let i = pointerWaves.length - 1; i >= 0; i--) {
        const wave = pointerWaves[i]; wave.r += wave.speed * dt; wave.life -= dt * 0.55; if (wave.life <= 0) { pointerWaves.splice(i, 1); continue; }
        ctx.beginPath(); ctx.lineWidth = 2 + wave.strength * 8; ctx.strokeStyle = `rgba(160, 220, 255, ${wave.life * 0.22})`; ctx.arc(wave.x, wave.y, wave.r, 0, Math.PI * 2); ctx.stroke();
      }
    }
    function drawCenterCore() {
      const cx = w / 2, cy = h / 2, bloom = parseFloat(bloomInput.value), radius = 28 + audioState.bass * 46 + audioState.flux * 24;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * (2.4 + bloom)); grad.addColorStop(0, `rgba(255,255,255,${0.20 + audioState.amp * 0.12})`); grad.addColorStop(0.25, `rgba(120,200,255,${0.18 + audioState.highs * 0.16})`); grad.addColorStop(1, 'rgba(0,0,0,0)'); ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(cx, cy, radius * (2.4 + bloom), 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.fillStyle = `rgba(210,235,255,${0.30 + audioState.amp * 0.24})`; ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.fill();
    }
    function animate(now) {
      requestAnimationFrame(animate); const dt = Math.min(0.033, ((now || 0) - (animate.last || now || 0)) / 1000 || 0.016); animate.last = now || 0; time += dt; updateAudio(); drawBackdrop(); drawStars(); drawGrid(); drawTunnel(); updateAndDrawWaves(dt); drawCenterCore();
    }
    function spawnWave(x, y, strength = 0.8) { pointerWaves.push({ x, y, r: 8, life: 1, speed: 180 + strength * 120, strength }); }
    window.addEventListener('resize', resize);
    window.addEventListener('pointerdown', (e) => spawnWave(e.clientX, e.clientY, 1.0 + audioState.amp * 0.5));
    startBtn.addEventListener('click', startMic);
    toggleUiBtn.addEventListener('click', () => {
      uiHidden = !uiHidden; hud.style.display = uiHidden ? 'none' : 'flex'; footer.style.display = uiHidden ? 'none' : 'flex'; toggleUiBtn.textContent = uiHidden ? 'Show UI' : 'Hide UI';
      if (uiHidden) {
        const floating = document.createElement('button'); floating.id = 'showUiFloating'; floating.textContent = 'Show UI'; floating.style.position = 'fixed'; floating.style.top = '16px'; floating.style.right = '16px'; floating.style.zIndex = '6'; floating.className = 'panel'; floating.style.pointerEvents = 'auto'; floating.style.padding = '12px 14px'; document.body.appendChild(floating);
        floating.addEventListener('click', () => { uiHidden = false; hud.style.display = 'flex'; footer.style.display = 'flex'; toggleUiBtn.textContent = 'Hide UI'; floating.remove(); }, { once: true });
      }
    });
    resize(); requestAnimationFrame(animate);
  </script>
</body>
</html>
